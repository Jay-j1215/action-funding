<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>펀딩보드</title>
<link rel="icon" href="icon.png" type="image/png">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#64748b;display:flex;align-items:flex-start;justify-content:flex-start;padding:16px 0 0 16px;}
.app{display:flex;width:1280px;height:870px;overflow:hidden;flex-shrink:0;border-radius:16px;}

/* ── SIDEBAR 320px ── */
.sidebar{width:320px;min-width:320px;height:870px;background:#f1f5f9;display:flex;flex-direction:column;overflow:hidden;}

.s-banner{height:62px;background:#38bdf8;display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0;}
.s-banner-img{width:44px;height:44px;background:transparent;border-radius:8px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;}
.s-banner-img img{width:100%;height:100%;object-fit:cover;}
.s-banner-text{font-size:22px;font-weight:800;color:#0c4a6e;}

.s-bgm{margin:8px 10px 0;background:#fff;border-radius:10px;padding:8px 12px;flex-shrink:0;}
.bgm-song{font-size:13px;color:#0369a1;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
.bgm-controls{display:flex;align-items:center;gap:6px;}
.bgm-btn{background:#e0f2fe;border:none;border-radius:6px;cursor:pointer;font-size:14px;color:#0369a1;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.bgm-btn:hover{background:#0ea5e9;color:#fff;}
.vol-slider{flex:1;height:4px;accent-color:#0ea5e9;cursor:pointer;}

.s-menu{flex:1;overflow-y:visible;padding:4px 0;background:#f1f5f9;}
.s-menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px;}
.mi{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:11px 4px 13px;cursor:pointer;border-radius:12px;background:#bae6fd;transition:all 0.15s;text-align:center;gap:8px;}
.mi-label{font-size:18px;font-weight:700;color:#0369a1;line-height:1.2;white-space:nowrap;}
.mi:hover{background:#7dd3fc;transform:translateY(-2px);box-shadow:0 4px 12px rgba(14,165,233,0.35);}
.mi:active{transform:translateY(0);}

.s-banners{flex-shrink:0;padding:6px 10px;display:flex;flex-direction:column;gap:4px;background:#e2e8f0;}
.s-bi{height:70px;border-radius:8px;overflow:hidden;cursor:pointer;position:relative;}
.s-bi:hover{opacity:0.88;}
.s-bi img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
.s-bi-fb{width:100%;height:100%;background:#bae6fd;display:flex;align-items:center;justify-content:center;font-size:18px;color:#0369a1;font-weight:700;}
.s-bi-logo{position:absolute;top:5px;right:5px;width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;overflow:hidden;}

/* ── CONTENT 960px ── */
.content{flex:1;height:870px;background:#e2e8f0;display:flex;flex-direction:column;overflow:hidden;}
.c-header{height:62px;background:#075985;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.c-title{font-size:28px;font-weight:800;color:#fff;letter-spacing:1px;}

.c-memo{margin:8px 10px 0;flex-shrink:0;display:flex;gap:8px;}
.c-memo-left{flex:1;display:flex;flex-direction:column;gap:0;}
.c-memo-left textarea{width:100%;background:#fff;border-radius:8px 8px 0 0;padding:9px 12px;font-size:17px;font-weight:700;color:#1e293b;resize:none;outline:none;font-family:inherit;line-height:1.75;border:none;border-bottom:1px solid #e2e8f0;overflow:hidden;height:109px;}
.c-memo-left textarea::placeholder{color:#94a3b8;font-weight:400;}
.c-memo-teams{background:#fff;border-radius:0 0 8px 8px;overflow:hidden;}
.c-memo-team-row{display:flex;align-items:stretch;border-top:1px solid #e2e8f0;height:36px;}
.c-memo-team-row:first-child{border-top:none;}
.c-memo-team-label{width:100px;min-width:100px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;cursor:pointer;user-select:none;transition:background 0.15s;padding:6px 0;}
#labelA{background:#dcfce7;color:#166534;opacity:0.5;}
#labelA:hover{background:#bbf7d0;}
#labelB{background:#fee2e2;color:#991b1b;opacity:0.5;}
#labelB:hover{background:#fecaca;}
.c-memo-team-input{flex:1;border:none;outline:none;padding:6px 10px;font-size:15px;font-weight:600;color:#1e293b;font-family:inherit;background:#fff;height:36px;}
.c-memo-team-input::placeholder{color:#94a3b8;font-weight:400;}

.c-timer{flex:1;background:#fff;border-radius:8px;padding:10px;display:flex;flex-direction:column;height:183px;gap:8px;}
.timer-row1{display:flex;align-items:stretch;gap:8px;flex:1;}
.timer-nums{display:flex;align-items:center;gap:4px;flex:1;}
.timer-num-wrap{background:#bae6fd;border-radius:8px;border:2px solid #0ea5e9;display:flex;align-items:center;justify-content:center;flex:1;height:100%;}
.timer-num{font-size:58px;font-weight:800;color:#075985;font-family:monospace;line-height:1;}
.timer-colon{font-size:52px;font-weight:800;color:#0ea5e9;line-height:1;display:flex;align-items:center;padding:0 2px;}
.timer-btns-col{display:flex;flex-direction:column;gap:6px;width:calc((100% - 10px) / 3);flex-shrink:0;}
.timer-top-btn{border-radius:6px;border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;white-space:nowrap;display:flex;align-items:center;justify-content:center;flex:1;width:100%;}
.timer-top-btn.start{background:#22c55e;}
.timer-top-btn.start:hover{background:#16a34a;}
.timer-top-btn.stop{background:#ef4444;}
.timer-top-btn.stop:hover{background:#dc2626;}
.timer-top-btn.reset{background:#64748b;}
.timer-top-btn.reset:hover{background:#475569;}
.timer-row2{display:grid;grid-template-columns:repeat(6, 1fr);gap:6px;}
.timer-btn{padding:8px 0;border-radius:6px;border:none;background:#0ea5e9;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.timer-btn:hover{background:#0284c7;}
.timer-btn.minus{background:#f97316;}
.timer-btn.minus:hover{background:#ea580c;}

/* ── 상단 바 ── */
.c-top-bar{margin:8px 10px 4px;height:36px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.c-top-bar-title{font-size:18px;font-weight:800;color:#075985;}
.stat-team{display:flex;align-items:center;gap:6px;margin-left:auto;}
.stat-team-lbl{font-size:15px;font-weight:400;color:#475569;white-space:nowrap;}
.stat-team-inp{width:50px;text-align:center;border:2px solid #bae6fd;border-radius:6px;padding:3px;font-size:19px;font-weight:400;color:#075985;background:#fff;outline:none;}
.team-btn{width:28px;height:28px;border-radius:50%;border:none;background:#e0f2fe;cursor:pointer;font-size:16px;font-weight:400;color:#0369a1;display:flex;align-items:center;justify-content:center;}
.team-btn:hover{background:#0ea5e9;color:#fff;}

/* ── 현황 바 2개 ── */
.c-stat-row{margin:0 10px 6px;display:flex;gap:8px;flex-shrink:0;height:50px;}
.stat-half{flex:1;background:#075985;border-radius:10px;display:flex;align-items:stretch;overflow:hidden;}
.stat-label{padding:0 16px;font-size:19px;font-weight:800;color:#fff;display:flex;align-items:center;background:#0c4a6e;white-space:nowrap;}
.stat-inner{display:flex;align-items:center;gap:10px;padding:0 14px;}
.stat-box{background:#fff;border-radius:8px;padding:5px 14px;display:flex;align-items:center;gap:8px;}
.stat-box-lbl{font-size:16px;font-weight:700;color:#0369a1;}
.stat-box-val{font-size:22px;font-weight:800;color:#075985;width:100px;text-align:center;white-space:nowrap;}

/* ── 보드 ── */
.c-boards-unified{display:flex;flex:1;gap:8px;margin:0 10px 10px;min-height:0;}
.board{flex:1;display:flex;flex-direction:column;overflow:hidden;border-radius:12px;background:#fff;min-height:0;}
.board-input{display:flex;align-items:center;gap:7px;padding:9px 10px;background:#bae6fd;flex-shrink:0;height:62px;border-radius:12px 12px 0 0;}
.b-fi{flex:1;padding:8px 12px;border:none;border-radius:8px;font-size:20px;font-weight:600;color:#1e293b;outline:none;background:#fff;height:48px;}
.b-fi::placeholder{color:#94a3b8;font-weight:400;}
.b-enter{width:48px;height:48px;border-radius:8px;border:none;background:#0ea5e9;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.b-enter:hover{background:#0284c7;}
.b-enter svg{width:22px;height:22px;}
.board-list{flex:1;overflow-y:auto;padding:2px 0;}
.board-list-noscroll{overflow-y:auto;}
.board-list::-webkit-scrollbar{width:4px;}
.board-list::-webkit-scrollbar-thumb{background:#bae6fd;border-radius:3px;}
.b-row{display:flex;align-items:center;padding:6px 46px 6px 10px;border-bottom:1px solid #f1f5f9;position:relative;gap:22px;min-height:43px;}
.b-row:hover{background:#f0f9ff;}
.b-row.ph-row{background:#fff;}
.rank-wrap{width:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.b-name{flex:1;color:#1e293b;font-weight:700;font-size:21px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.b-name:hover{color:#0369a1;text-decoration:underline;}
.b-name.no-edit,.b-name.ph-name{cursor:default;}
.b-name.no-edit:hover,.b-name.ph-name:hover{color:#1e293b;text-decoration:none;}
.b-name.ph-name{color:#cbd5e1;}
.b-cnt{color:#075985;font-weight:800;font-size:21px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.b-cnt:hover{text-decoration:underline;}
.b-cnt.no-edit{cursor:default;}
.b-cnt.no-edit:hover{text-decoration:none;}
.del-btn{opacity:0;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:20px;color:#ef4444;font-weight:700;line-height:1;transition:opacity 0.15s;}
.b-row:hover .del-btn{opacity:1;}
.edit-input{border:2px solid #0ea5e9;border-radius:6px;padding:3px 8px;font-size:19px;font-weight:600;outline:none;width:110px;color:#1e293b;}

.eye-btn{background:none;border:none;cursor:pointer;color:#fff;opacity:0.8;padding:4px;display:flex;align-items:center;margin-left:6px;flex-shrink:0;}
.eye-btn:hover{opacity:1;}
.eye-btn svg{width:22px;height:22px;}
.g-stat-val{display:flex;align-items:center;padding:0 14px;}
.g-stat-box{background:#fee8d6;border-radius:8px;padding:5px 18px;display:flex;align-items:center;gap:8px;}
.g-stat-box-val{font-size:22px;font-weight:800;color:#075985;width:136px;text-align:center;white-space:nowrap;}
.g-toggle-wrap{display:flex;align-items:center;gap:6px;padding:0 14px;margin-left:auto;}
.g-toggle-lbl{font-size:15px;font-weight:700;color:#bae6fd;white-space:nowrap;}
.g-toggle{display:flex;gap:4px;}
.g-toggle-btn{padding:5px 14px;border-radius:6px;border:none;font-size:16px;font-weight:700;cursor:pointer;background:#0284c7;color:#7dd3fc;transition:all 0.15s;}
.g-toggle-btn.active{background:#fff;color:#075985;}
.obs-bar{display:flex;align-items:center;padding:4px 10px;background:#e2e8f0;font-size:14px;color:#64748b;font-weight:600;gap:8px;}
.obs-line{flex:1;height:1px;background:#94a3b8;}
</style>
</head>

      <div class="stat-label">개인</div>
      <div class="stat-inner">
        <div class="stat-box" style="background:#dcfce7;"><span class="stat-box-lbl">총</span><span class="stat-box-val" id="statTotal">0개</span></div>
        <div class="stat-box" style="background:#fee2e2;"><span class="stat-box-lbl">두</span><span class="stat-box-val" id="statPer">0개</span></div>
        <button class="eye-btn" id="eyeBtn" onclick="toggleIndVisible()" title="개인 펀딩 숨기기/보이기">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="stat-half">
      <div class="stat-label">단체</div>
      <div class="g-stat-val">
        <div class="g-stat-box" id="gStatBox"><span class="g-stat-box-val" id="gStatVal">0개</span></div>
      </div>
    </div>
  </div>

  <!-- 보드 2개 -->
  <div class="c-boards-unified">
    <div class="board">
      <div class="board-input">
        <input class="b-fi" id="leftIn" placeholder="닉네임  펀딩수  ↵" onkeydown="if(event.key==='Enter')addLeft()">
        <button class="b-enter" onclick="addLeft()"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg></button>
      </div>
      <div class="board-list" id="leftList"></div>
    </div>
    <div class="board">
      <div class="board-input">
        <input class="b-fi" id="gIn" placeholder="플레이어  펀딩수  ↵" onkeydown="if(event.key==='Enter')addGroup()">
        <button class="b-enter" onclick="addGroup()"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg></button>
      </div>
      <div class="board-list board-list-noscroll" id="gList"></div>
    </div>
  </div>
</div>
</div>

<script>
var leftData=[],rightData=[],orderL=0,orderR=0;
var gData=[],gOrderN=0;
var bgmMuted=false;

/* ── 아이콘 ── */
var RANK_EM=['🥇','🥈','🥉'];
function rankIcon(i){if(i<3)return'<span style="font-size:30px;line-height:1;">'+RANK_EM[i]+'</span>';return'<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#e2e8f0;font-size:12px;font-weight:800;color:#475569;line-height:1;">'+(i+1)+'</span>';}
var G_RANK=['🥇','🥈','🥉'];
function gRankIcon(i){if(i<3)return'<span style="font-size:30px;line-height:1;">'+G_RANK[i]+'</span>';return'<span style="font-size:14px;font-weight:800;color:#64748b;">'+(i+1)+'등</span>';}

/* ── 경고음 ── */
function beep(){try{var ac=new(window.AudioContext||window.webkitAudioContext)(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(0.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.35);o.start();o.stop(ac.currentTime+0.35);}catch(e){}}
function alarm(){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var totalDur=2.0;
    // 삐-삐-삐 패턴: 0.25초 온, 0.15초 오프 x 5회
    var pattern=[0,0.4,0.8,1.2,1.6];
    pattern.forEach(function(start){
      var o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.type='sine';
      o.frequency.setValueAtTime(1047,ac.currentTime+start);      // C6
      o.frequency.setValueAtTime(784, ac.currentTime+start+0.12); // G5
      g.gain.setValueAtTime(0,ac.currentTime+start);
      g.gain.linearRampToValueAtTime(0.5,ac.currentTime+start+0.02);
      g.gain.setValueAtTime(0.5,ac.currentTime+start+0.22);
      g.gain.linearRampToValueAtTime(0,ac.currentTime+start+0.28);
      o.start(ac.currentTime+start);
      o.stop(ac.currentTime+start+0.3);
    });
  }catch(e){}
}

/* ── BGM ── */
function togglePlay(){var a=document.getElementById('bgmAudio');if(a.paused){a.play().then(function(){document.getElementById('playBtn').textContent='⏸';}).catch(function(){});}else{a.pause();document.getElementById('playBtn').textContent='▶';}}
function stopBgm(){var a=document.getElementById('bgmAudio');a.pause();a.currentTime=0;document.getElementById('playBtn').textContent='▶';}
function toggleMute(){var a=document.getElementById('bgmAudio');bgmMuted=!bgmMuted;a.muted=bgmMuted;document.getElementById('muteBtn').textContent=bgmMuted?'🔇':'🔊';if(!bgmMuted)document.getElementById('volSlider').value=Math.round(a.volume*100);}
function setVolume(v){var a=document.getElementById('bgmAudio');var vol=parseInt(v)/100;a.volume=vol;a.muted=(vol===0);bgmMuted=(vol===0);document.getElementById('muteBtn').textContent=(vol===0)?'🔇':'🔊';}

/* ── 개인 펀딩 숨기기 토글 ── */
var indVisible=true;
function toggleIndVisible(){
  indVisible=!indVisible;
  // 아이콘 변경
  document.getElementById('eyeIcon').innerHTML=indVisible
    ?'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
    :'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  // 현황 바 수량 텍스트 색
  var hide=!indVisible;
  var totalEl=document.getElementById('statTotal');
  var perEl=document.getElementById('statPer');
  totalEl.style.color=hide?'#dcfce7':'#075985';
  perEl.style.color=hide?'#fee2e2':'#075985';
  // 개인 보드 텍스트 색
  applyIndHide(hide);
}
function applyIndHide(hide){
  var list=document.getElementById('leftList');
  if(!list)return;
  list.querySelectorAll('.b-name,.b-cnt').forEach(function(el){el.style.color=hide?'rgba(0,0,0,0)':'';});
  list.querySelectorAll('.rank-wrap').forEach(function(el){el.style.opacity=hide?'0':'';});
}

/* ── 개인: 통계 ── */
function changeTeam(d){var el=document.getElementById('teamCount');el.value=Math.min(10,Math.max(1,(parseInt(el.value)||5)+d));updateStats();}
function getTotal(){return leftData.reduce(function(s,r){return s+r.cnt;},0);}
function updateStats(){var tot=getTotal(),team=parseInt(document.getElementById('teamCount').value)||5;document.getElementById('statTotal').textContent=tot.toLocaleString()+'개';document.getElementById('statPer').textContent=(team>0?Math.floor(tot/team):0).toLocaleString()+'개';}

/* ── 파싱 ── */
function parseInput(val){val=val.trim();var m=val.match(/^(.+?)\s+(\d+)$/);if(m&&m[1].trim()){var c=parseInt(m[2]);if(c>0)return{name:m[1].trim(),cnt:c};}return null;}

/* ── 렌더: 좌측(펀딩) ── */
function renderLeft(){
  var sorted=leftData.slice().sort(function(a,b){return b.cnt!==a.cnt?b.cnt-a.cnt:a.order-b.order;});
  var html='';
  sorted.forEach(function(r,i){html+='<div class="b-row" onmouseenter="this.querySelector(\'.del-btn\').style.opacity=1" onmouseleave="this.querySelector(\'.del-btn\').style.opacity=0"><div class="rank-wrap">'+rankIcon(i)+'</div><span class="b-name" onclick="editLName(this,'+r.order+')">'+r.name+'</span><span class="b-cnt" onclick="editLCnt(this,'+r.order+')" style="margin-left:auto">'+r.cnt.toLocaleString()+'개</span><button class="del-btn" onclick="delLeft('+r.order+')">✕</button></div>';});
  for(var i=sorted.length;i<3;i++){html+='<div class="b-row ph-row"><div class="rank-wrap">'+rankIcon(i)+'</div><span class="b-name ph-name">—</span></div>';}
  document.getElementById('leftList').innerHTML=html;
  applyIndHide(!indVisible);
}

/* ── 렌더: 우측(펀딩2) ── */
function renderRight(){
  var sorted=rightData.slice().sort(function(a,b){return b.cnt!==a.cnt?b.cnt-a.cnt:a.order-b.order;});
  var html='',obsShown=false;
  sorted.forEach(function(r,i){
    if(i===4&&!obsShown){html+='<div class="obs-bar"><div class="obs-line"></div><span>옵저버</span><div class="obs-line"></div></div>';obsShown=true;}
    html+='<div class="b-row" onmouseenter="this.querySelector(\'.del-btn\').style.opacity=1" onmouseleave="this.querySelector(\'.del-btn\').style.opacity=0">'
      +'<div class="rank-wrap">'+rankIcon(i)+'</div>'
      +'<span class="b-name" onclick="editRName(this,'+r.order+')">'+r.name+'</span>'
      +'<span class="b-cnt" onclick="editCheer(this,'+r.order+')" style="margin-left:auto">'+r.cnt.toLocaleString()+'개</span>'
      +'<button class="del-btn" onclick="delRight('+r.order+')">✕</button>'
      +'</div>';
  });
  for(var i=sorted.length;i<3;i++){html+='<div class="b-row ph-row"><div class="rank-wrap">'+rankIcon(i)+'</div><span class="b-name ph-name">—</span></div>';}
  document.getElementById('rightList').innerHTML=html;
}

/* ── 개인: 추가/삭제 ── */
function addLeft(){var raw=document.getElementById('leftIn').value;var p=parseInput(raw);if(!p){beep();return;}var ex=null;for(var i=0;i<leftData.length;i++){if(leftData[i].name===p.name){ex=leftData[i];break;}}if(ex)ex.cnt+=p.cnt;else leftData.push({name:p.name,cnt:p.cnt,order:orderL++});document.getElementById('leftIn').value='';renderLeft();updateStats();}
function addRight(){var raw=document.getElementById('rightIn').value;var p=parseInput(raw);if(!p){beep();return;}var ex=null;for(var i=0;i<rightData.length;i++){if(rightData[i].name===p.name){ex=rightData[i];break;}}if(ex)ex.cnt+=p.cnt;else rightData.push({name:p.name,cnt:p.cnt,order:orderR++});document.getElementById('rightIn').value='';renderRight();}
function delLeft(o){for(var i=0;i<leftData.length;i++){if(leftData[i].order===o){leftData.splice(i,1);break;}}renderLeft();updateStats();}
function delRight(o){for(var i=0;i<rightData.length;i++){if(rightData[i].order===o){rightData.splice(i,1);break;}}renderRight();}

/* ── 개인: 편집 ── */
function editLName(el,order){if(el.classList.contains('no-edit')||el.classList.contains('ph-name'))return;var cur=el.textContent;var inp=document.createElement('input');inp.className='edit-input';inp.value=cur;inp.style.width='140px';el.replaceWith(inp);inp.focus();inp.select();function save(){var v=inp.value.trim()||cur;for(var i=0;i<leftData.length;i++){if(leftData[i].order===order){leftData[i].name=v;break;}}renderLeft();}inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cur;inp.blur();}});}
function editLCnt(el,order){var r=null;for(var i=0;i<leftData.length;i++){if(leftData[i].order===order){r=leftData[i];break;}}if(!r)return;
  var preSorted=leftData.slice().sort(function(a,b){return b.cnt!==a.cnt?b.cnt-a.cnt:a.order-b.order;});
  preSorted.forEach(function(item,idx){item.order=idx;});
  orderL=leftData.length;
  var inp=document.createElement('input');inp.className='edit-input';inp.type='number';inp.value=r.cnt;el.replaceWith(inp);inp.focus();inp.select();function save(){var v=parseInt(inp.value);if(!isNaN(v)&&v>=0)r.cnt=v;renderLeft();updateStats();}inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});}
function editRName(el,order){var cur=el.textContent;var inp=document.createElement('input');inp.className='edit-input';inp.value=cur;inp.style.width='140px';el.replaceWith(inp);inp.focus();inp.select();function save(){var v=inp.value.trim()||cur;for(var i=0;i<rightData.length;i++){if(rightData[i].order===order){rightData[i].name=v;break;}}renderRight();}inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cur;inp.blur();}});}
function editCheer(el,order){var r=null;for(var i=0;i<rightData.length;i++){if(rightData[i].order===order){r=rightData[i];break;}}if(!r)return;
  var preSorted=rightData.slice().sort(function(a,b){return b.cnt!==a.cnt?b.cnt-a.cnt:a.order-b.order;});
  preSorted.forEach(function(item,idx){item.order=idx;});
  orderR=rightData.length;
  var inp=document.createElement('input');inp.className='edit-input';inp.type='number';inp.value=r.cnt;el.replaceWith(inp);inp.focus();inp.select();function save(){var v=parseInt(inp.value);if(!isNaN(v)&&v>=0)r.cnt=v;renderRight();}inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});}

/* ── 단체 ── */
function getGTotal(){return gData.reduce(function(s,r){return s+r.cnt;},0);}
function updateGStat(){
  document.getElementById('gStatVal').textContent=getGTotal().toLocaleString()+'개';
}
function renderGroup(){
  var sorted=gData.slice().sort(function(a,b){return b.cnt!==a.cnt?b.cnt-a.cnt:a.order-b.order;});
  var html='';
  var teamCount=parseInt(document.getElementById('teamCount').value)||5;
  var lastCnt=sorted.length>0?sorted[sorted.length-1].cnt:null;
  var lastUnique=sorted.length>=teamCount*2&&sorted.filter(function(r){return r.cnt===lastCnt;}).length===1;
  var bangIdx=lastUnique?sorted.length-1:-1;

  // 1~4등 영역
  for(var i=0;i<4;i++){
    if(i<sorted.length){
      var r=sorted[i];
      var rankHtml=i===bangIdx?'<span style="font-size:13px;font-weight:800;white-space:nowrap;">방싸개</span>':gRankIcon(i);
      var rowStyle=i===bangIdx?' style="background:#fee2e2;"':'';
      html+='<div class="b-row"'+rowStyle+' onmouseenter="this.querySelector(\'.del-btn\').style.opacity=1" onmouseleave="this.querySelector(\'.del-btn\').style.opacity=0">'
        +'<div class="rank-wrap">'+rankHtml+'</div>'
        +'<span class="b-name" onclick="editGName(this,'+r.order+')">'+r.name+'</span>'
        +'<span class="b-cnt" onclick="editGCnt(this,'+r.order+')" style="margin-left:auto">'+r.cnt.toLocaleString()+'개</span>'
        +'<button class="del-btn" onclick="delGroup('+r.order+')">✕</button>'
        +'</div>';
    } else {
      html+='<div class="b-row ph-row"><div class="rank-wrap">'+gRankIcon(i)+'</div><span class="b-name ph-name">—</span></div>';
    }
  }

  // 옵저버 라인 고정
  html+='<div class="obs-bar"><div class="obs-line"></div><span>옵저버</span><div class="obs-line"></div></div>';

  // 5등 이후 (입력된 항목만)
  for(var i=4;i<sorted.length;i++){
    var r=sorted[i];
    var rankHtml=i===bangIdx?'<span style="font-size:13px;font-weight:800;white-space:nowrap;">방싸개</span>':gRankIcon(i);
    var rowStyle=i===bangIdx?' style="background:#fee2e2;"':'';
    html+='<div class="b-row"'+rowStyle+' onmouseenter="this.querySelector(\'.del-btn\').style.opacity=1" onmouseleave="this.querySelector(\'.del-btn\').style.opacity=0">'
      +'<div class="rank-wrap">'+rankHtml+'</div>'
      +'<span class="b-name" onclick="editGName(this,'+r.order+')">'+r.name+'</span>'
      +'<span class="b-cnt" onclick="editGCnt(this,'+r.order+')" style="margin-left:auto">'+r.cnt.toLocaleString()+'개</span>'
      +'<button class="del-btn" onclick="delGroup('+r.order+')">✕</button>'
      +'</div>';
  }

  document.getElementById('gList').innerHTML=html;
  updateGStat();
}
function addGroup(){var raw=document.getElementById('gIn').value;var p=parseInput(raw);if(!p){beep();return;}var ex=null;for(var i=0;i<gData.length;i++){if(gData[i].name===p.name){ex=gData[i];break;}}if(ex)ex.cnt+=p.cnt;else gData.push({name:p.name,cnt:p.cnt,order:gOrderN++});document.getElementById('gIn').value='';renderGroup();}
function delGroup(o){for(var i=0;i<gData.length;i++){if(gData[i].order===o){gData.splice(i,1);break;}}renderGroup();}
function editGName(el,order){if(el.classList.contains('ph-name'))return;var cur=el.textContent;var inp=document.createElement('input');inp.className='edit-input';inp.value=cur;inp.style.width='130px';el.replaceWith(inp);inp.focus();inp.select();function save(){var v=inp.value.trim()||cur;for(var i=0;i<gData.length;i++){if(gData[i].order===order){gData[i].name=v;break;}}renderGroup();}inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cur;inp.blur();}});}
function editGCnt(el,order){var r=null;for(var i=0;i<gData.length;i++){if(gData[i].order===order){r=gData[i];break;}}if(!r)return;
  // 편집 전 현재 순위 기준으로 order 재정렬 → 동률 시 기존 위치 유지
  var preSorted=gData.slice().sort(function(a,b){return b.cnt!==a.cnt?b.cnt-a.cnt:a.order-b.order;});
  preSorted.forEach(function(item,idx){item.order=idx;});
  gOrderN=gData.length;
  var inp=document.createElement('input');inp.className='edit-input';inp.type='number';inp.value=r.cnt;el.replaceWith(inp);inp.focus();inp.select();function save(){var v=parseInt(inp.value);if(!isNaN(v)&&v>=0)r.cnt=v;renderGroup();}inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});}

/* ── 초기화 ── */
function resetAll(){if(!confirm('모든 펀딩 정보를 초기화할까요?'))return;leftData=[];rightData=[];orderL=0;orderR=0;gData=[];gOrderN=0;document.getElementById('memo').value='';document.getElementById('teamCount').value=5;renderLeft();renderRight();updateStats();renderGroup();}
function openLink(u){
  if(!u) return;
  var a=document.createElement('a');
  a.href=u; a.target='_blank'; a.rel='noopener noreferrer';
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
var _dopamineWin=null;
function openDopamine(tab){
  var url='dopamine.html#'+tab;
  if(_dopamineWin&&!_dopamineWin.closed){
    _dopamineWin.focus();
    _dopamineWin.postMessage({type:'switchTab',tab:tab},'*');
  } else {
    var a=document.createElement('a');
    a.href=url; a.target='_blank'; a.rel='noopener noreferrer';
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    _dopamineWin=null;
  }
}
function openRoulette(){openDopamine('roulette');}

document.addEventListener('DOMContentLoaded',function(){
  var a=document.getElementById('bgmAudio');
  a.volume=0.1;
  a.addEventListener('ended',function(){document.getElementById('playBtn').textContent='▶';});
  document.getElementById('memo').addEventListener('keydown',function(e){if(e.key==='Enter'&&this.value.split('\n').length>=3)e.preventDefault();});
  renderLeft();updateStats();renderGroup();
});

// ========== 팀 라벨 편집 ==========
function editTeamLabel(team) {
  const labelEl = document.getElementById('label' + team);
  const current = labelEl.dataset.name || '';
  const input = document.createElement('input');
  input.type = 'text';
  input.value = current;
  input.placeholder = '팀장 입력';
  input.style.cssText = 'width:100%;border:none;outline:none;background:transparent;font-size:15px;font-weight:700;color:#475569;text-align:center;font-family:inherit;';
  labelEl.innerHTML = '';
  labelEl.appendChild(input);
  input.focus();
  input.select();
  function save() {
    const val = input.value.trim();
    labelEl.dataset.name = val;
    labelEl.textContent = val ? val + '팀' : '팀장 입력';
    labelEl.style.opacity = val ? '1' : '0.5';
    labelEl.onclick = () => editTeamLabel(team);
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = current; input.blur(); }
  });
}

// ========== 타이머 기능 ============
var timerState = {
  totalSeconds: 0,
  running: false,
  interval: null
};

function updateTimerDisplay() {
  var min = Math.floor(timerState.totalSeconds / 60);
  var sec = timerState.totalSeconds % 60;
  document.getElementById('timerMin').textContent = String(min).padStart(2, '0');
  document.getElementById('timerSec').textContent = String(sec).padStart(2, '0');
}

function adjustTimer(seconds) {
  if (timerState.running) return;
  timerState.totalSeconds = Math.max(0, timerState.totalSeconds + seconds);
  updateTimerDisplay();
}

function startTimer() {
  if (timerState.totalSeconds === 0) return;
  
  if (timerState.running) {
    // 일시정지
    timerState.running = false;
    clearInterval(timerState.interval);
    document.getElementById('timerStartBtn').textContent = '시작';
    document.getElementById('timerStartBtn').className = 'timer-top-btn start';
  } else {
    // 시작
    timerState.running = true;
    document.getElementById('timerStartBtn').textContent = '정지';
    document.getElementById('timerStartBtn').className = 'timer-top-btn stop';
    
    timerState.interval = setInterval(function() {
      if (timerState.totalSeconds > 0) {
        timerState.totalSeconds--;
        updateTimerDisplay();
      } else {
        // 타이머 종료
        timerState.running = false;
        clearInterval(timerState.interval);
        document.getElementById('timerStartBtn').textContent = '시작';
        document.getElementById('timerStartBtn').className = 'timer-top-btn start';
        
        // 알람 소리
        alarm();
      }
    }, 1000);
  }
}

function resetTimer() {
  timerState.running = false;
  timerState.totalSeconds = 0;
  clearInterval(timerState.interval);
  document.getElementById('timerStartBtn').textContent = '시작';
  document.getElementById('timerStartBtn').className = 'timer-top-btn start';
  updateTimerDisplay();
}

</script>
<script>
// 아이콘 이미지 검은 배경 제거: canvas로 픽셀 처리
function removeBlackBg(img) {
  const canvas = document.createElement('canvas');
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = data.data;
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];
    const brightness = (r + g + b) / 3;
    if (brightness < 50) {
      d[i+3] = 0;
    } else if (brightness < 100) {
      d[i+3] = Math.round((brightness - 50) / 50 * 255);
    }
  }
  ctx.putImageData(data, 0, 0);
  img.src = canvas.toDataURL('image/png');
  // 검은 배경 제거 후 외곽선 drop-shadow 적용
  img.style.filter = 'drop-shadow(0 0 1px #000) drop-shadow(0 0 2px #000) drop-shadow(0 0 3px rgba(0,0,0,0.5))';
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.icon-img').forEach(img => {
    if (img.complete) removeBlackBg(img);
    else img.onload = () => removeBlackBg(img);
  });
});
</script>
