<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Action Portal - Funding Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#64748b;display:flex;align-items:flex-start;justify-content:flex-start;padding:10px 0 0 10px;}
.app{display:flex;width:1440px;height:900px;overflow:hidden;flex-shrink:0;border-radius:4px;}

/* ── SIDEBAR ── */
.sidebar{width:360px;min-width:360px;height:900px;background:#f1f5f9;display:flex;flex-direction:column;overflow:hidden;}

.s-banner{height:62px;background:#075985;display:flex;align-items:center;gap:14px;padding:0 18px;flex-shrink:0;}
.s-banner-img{width:46px;height:46px;background:#0c4a6e;border-radius:8px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;}
.s-banner-img img{width:100%;height:100%;object-fit:cover;}
.s-banner-text{font-size:24px;font-weight:800;color:#fff;}

.s-bgm{margin:10px 12px 0;background:#fff;border-radius:10px;padding:10px 14px;flex-shrink:0;}
.bgm-song{font-size:15px;color:#0369a1;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:7px;}
.bgm-controls{display:flex;align-items:center;gap:8px;}
.bgm-btn{background:#e0f2fe;border:none;border-radius:7px;cursor:pointer;font-size:16px;color:#0369a1;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.bgm-btn:hover{background:#0ea5e9;color:#fff;}
.bgm-bar{flex:1;height:6px;background:#e2e8f0;border-radius:4px;cursor:pointer;position:relative;}
.bgm-prog{height:100%;width:0%;background:#0ea5e9;border-radius:4px;pointer-events:none;}

.s-menu{flex:1;overflow-y:auto;padding:4px 0;background:#f1f5f9;}
.s-menu::-webkit-scrollbar{width:4px;}
.s-menu::-webkit-scrollbar-thumb{background:#cbd5e1;}
.mi{display:flex;align-items:center;gap:12px;padding:12px 18px;font-size:22px;font-weight:700;color:#0369a1;cursor:pointer;transition:background 0.15s;}
.mi:hover{background:#e0f2fe;color:#075985;}
.mi-icon{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.mi-icon img{width:36px;height:36px;object-fit:contain;}

.s-banners{flex-shrink:0;padding:10px 12px;display:flex;flex-direction:column;gap:6px;background:#e2e8f0;}
.s-bi{height:90px;border-radius:8px;overflow:hidden;cursor:pointer;}
.s-bi:hover{opacity:0.88;}
.s-bi img{width:100%;height:100%;object-fit:cover;object-position:center;}
.s-bi-fb{width:100%;height:100%;background:#bae6fd;display:flex;align-items:center;justify-content:center;font-size:20px;color:#0369a1;font-weight:700;}

/* ── CONTENT ── */
.content{flex:1;height:900px;background:#e2e8f0;display:flex;flex-direction:column;overflow:hidden;}
.c-header{height:62px;background:#075985;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.c-title{font-size:30px;font-weight:800;color:#fff;letter-spacing:1px;}

.c-memo{margin:10px 10px 0;flex-shrink:0;}
.c-memo textarea{width:100%;height:140px;background:#fff;border-radius:8px;padding:10px 14px;font-size:18px;font-weight:700;color:#1e293b;resize:none;outline:none;font-family:inherit;line-height:1.75;border:none;overflow:hidden;}
.c-memo textarea::placeholder{color:#94a3b8;font-weight:400;}

.c-tabs{display:flex;align-items:center;gap:10px;padding:8px 10px;flex-shrink:0;}
.tab-btn{display:flex;align-items:center;gap:8px;padding:8px 22px;border-radius:8px;border:none;background:#fff;font-size:22px;font-weight:700;color:#0369a1;cursor:pointer;transition:all 0.15s;}
.tab-btn:hover{background:#bae6fd;}
.tab-btn.active{background:#0ea5e9;color:#fff;}
.tab-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center;}
.tab-icon svg{width:26px;height:26px;}
.reset-btn{margin-left:auto;padding:8px 22px;border-radius:8px;border:none;background:#f97316;color:#fff;font-size:22px;font-weight:700;cursor:pointer;}
.reset-btn:hover{opacity:0.85;}

/* 개인 탭 */
.c-stat{margin:0 10px;background:#075985;border-radius:10px;display:flex;align-items:stretch;overflow:hidden;height:64px;flex-shrink:0;}
.stat-label{padding:0 20px;font-size:22px;font-weight:800;color:#fff;display:flex;align-items:center;background:#0c4a6e;white-space:nowrap;}
.stat-inner{display:flex;align-items:center;gap:12px;padding:0 18px;}
.stat-box{background:#fff;border-radius:8px;padding:6px 22px;display:flex;align-items:center;gap:10px;}
.stat-box-lbl{font-size:18px;font-weight:700;color:#0369a1;}
.stat-box-val{font-size:24px;font-weight:800;color:#075985;min-width:90px;text-align:center;}
.stat-team{display:flex;align-items:center;gap:8px;padding:0 16px;margin-left:auto;}
.stat-team-lbl{font-size:18px;font-weight:700;color:#bae6fd;white-space:nowrap;}
.stat-team-inp{width:58px;text-align:center;border:none;border-radius:6px;padding:3px 4px;font-size:22px;font-weight:800;color:#075985;background:#fff;outline:none;}
.team-btn{width:32px;height:32px;border-radius:50%;border:none;background:#fff;cursor:pointer;font-size:18px;font-weight:800;color:#0369a1;display:flex;align-items:center;justify-content:center;}
.team-btn:hover{background:#0ea5e9;color:#fff;}

.c-boards{display:flex;flex:1;gap:8px;margin:8px 10px 10px;overflow:hidden;}
.board{flex:1;display:flex;flex-direction:column;overflow:hidden;border-radius:10px;background:#fff;}

/* 입력창: 단일 필드 */
.board-input{display:flex;align-items:center;gap:8px;padding:10px 10px;background:#bae6fd;flex-shrink:0;height:72px;border-radius:10px 10px 0 0;}
.b-fi{flex:1;padding:10px 14px;border:none;border-radius:8px;font-size:22px;font-weight:600;color:#1e293b;outline:none;background:#fff;height:52px;}
.b-fi::placeholder{color:#94a3b8;font-weight:400;}
.b-enter{width:52px;height:52px;border-radius:8px;border:none;background:#0ea5e9;color:#fff;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.b-enter:hover{background:#0284c7;}
.b-enter svg{width:24px;height:24px;}

.board-list{flex:1;overflow-y:auto;padding:2px 0;}
.board-list::-webkit-scrollbar{width:5px;}
.board-list::-webkit-scrollbar-thumb{background:#bae6fd;border-radius:3px;}

.b-row{display:flex;align-items:center;padding:8px 50px 8px 12px;border-bottom:1px solid #f1f5f9;position:relative;gap:8px;min-height:58px;}
.b-row:hover{background:#f0f9ff;}
.b-row.sd-row{background:#eff6ff;}
.b-row.ph-row{background:#fff;}
.rank-wrap{width:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.b-name{flex:1;color:#1e293b;font-weight:700;font-size:24px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.b-name:hover{color:#0369a1;text-decoration:underline;}
.b-name.no-edit{cursor:default;}
.b-name.no-edit:hover{color:#1e293b;text-decoration:none;}
.b-name.ph-name{color:#cbd5e1;cursor:default;text-decoration:none !important;}
.b-name.ph-name:hover{color:#cbd5e1;text-decoration:none !important;}
.b-cnt{color:#075985;font-weight:800;font-size:24px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.b-cnt:hover{text-decoration:underline;}
.b-cnt.no-edit{cursor:default;}
.b-cnt.no-edit:hover{text-decoration:none;}
.b-cheer{color:#f97316;font-weight:700;font-size:22px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.b-cheer:hover{text-decoration:underline;}
.del-btn{opacity:0;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:22px;color:#ef4444;font-weight:700;line-height:1;transition:opacity 0.15s;}
.b-row:hover .del-btn{opacity:1;}
.edit-input{border:2px solid #0ea5e9;border-radius:6px;padding:4px 10px;font-size:22px;font-weight:600;outline:none;width:120px;color:#1e293b;}

/* 단체 탭 */
.grp-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#94a3b8;font-size:24px;font-weight:600;}
</style>
</head>

  <div class="c-memo">
    <textarea id="memo" placeholder="펀딩 정보(리그명, 참여인원 등)를 입력해 주세요."></textarea>
  </div>

  <!-- 개인 탭 콘텐츠 -->
  <div id="ind-content" style="display:flex;flex-direction:column;flex:1;overflow:hidden;gap:8px;">
    <div class="c-stat">
      <div class="stat-label">펀딩 현황</div>
      <div class="stat-inner">
        <div class="stat-box"><span class="stat-box-lbl">총</span><span class="stat-box-val" id="statTotal">0개</span></div>
        <div class="stat-box"><span class="stat-box-lbl">두</span><span class="stat-box-val" id="statPer">0개</span></div>
      </div>
      <div class="stat-team">
        <span class="stat-team-lbl">팀 인원 수</span>
        <button class="team-btn" onclick="changeTeam(-1)">−</button>
        <input type="number" class="stat-team-inp" id="teamCount" value="5" min="1" max="10" oninput="updateStats()">
        <button class="team-btn" onclick="changeTeam(1)">+</button>
      </div>
    </div>

    <div class="c-boards">
      <div class="board">
        <div class="board-input">
          <input class="b-fi" id="leftIn" placeholder="닉네임  펀딩수  ↵" onkeydown="if(event.key==='Enter')addLeft()">
          <button class="b-enter" onclick="addLeft()">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
          </button>
        </div>
        <div class="board-list" id="leftList"></div>
      </div>
      <!-- 응원 보드 -->
      <div class="board">
        <div class="board-input">
          <input class="b-fi" id="rightIn" placeholder="닉네임  응원수  ↵" onkeydown="if(event.key==='Enter')addRight()">
          <button class="b-enter" onclick="addRight()">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
          </button>
        </div>
        <div class="board-list" id="rightList"></div>
      </div>
    </div>
  </div>

  <!-- 단체 탭 콘텐츠 -->
  <div id="grp-content" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
    <div class="grp-placeholder">
      <span style="font-size:40px;">🏆</span>
      <span>준비 중입니다.</span>
    </div>
  </div>
</div>
</div>

<script>
/* 단일 스크립트 블록 */
var leftData=[], rightData=[], sdTotal=0, orderL=0, orderR=0, bgmMuted=false;

// ── 아이콘 ──
var RANK_EM=['🥇','🥈','🥉'];
function rankIcon(i){
  if(i<3) return '<span style="font-size:28px;line-height:1;">'+RANK_EM[i]+'</span>';
  return '<span style="font-size:18px;font-weight:800;color:#64748b;">'+(i+1)+'등</span>';
}
function cheerIcon(){ return '<span style="font-size:26px;line-height:1;">👍</span>'; }
function diamondIcon(){ return '<span style="font-size:28px;line-height:1;">💎</span>'; }

// ── 경고음 ──
function beep(){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(0.3,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.35);
    o.start(); o.stop(ac.currentTime+0.35);
  }catch(e){}
}

// ── BGM ──
function togglePlay(){
  var a=document.getElementById('bgmAudio');
  if(a.paused){ a.play().then(function(){document.getElementById('playBtn').textContent='⏸';}).catch(function(){}); }
  else{ a.pause(); document.getElementById('playBtn').textContent='▶'; }
}
function stopBgm(){
  var a=document.getElementById('bgmAudio');
  a.pause(); a.currentTime=0;
  document.getElementById('playBtn').textContent='▶';
  document.getElementById('bgmProg').style.width='0%';
}
function toggleMute(){
  var a=document.getElementById('bgmAudio');
  bgmMuted=!bgmMuted; a.muted=bgmMuted;
  document.getElementById('muteBtn').textContent=bgmMuted?'🔇':'🔊';
}
function seekBgm(e){
  var a=document.getElementById('bgmAudio');
  if(!a.duration) return;
  var bar=document.getElementById('bgmBar');
  a.currentTime=(e.offsetX/bar.offsetWidth)*a.duration;
}

// ── 탭 ──
function setTab(t){
  ['ind','grp'].forEach(function(id){
    document.getElementById('tab-'+id).classList.toggle('active', id===t);
    var el=document.getElementById(id+'-content');
    el.style.display=(id===t)?'flex':'none';
  });
}

// ── 팀/통계 ──
function changeTeam(d){
  var el=document.getElementById('teamCount');
  el.value=Math.min(10,Math.max(1,(parseInt(el.value)||5)+d));
  updateStats();
}
function getTotal(){ return leftData.reduce(function(s,r){return s+r.cnt;},0)+sdTotal; }
function updateStats(){
  var tot=getTotal(), team=parseInt(document.getElementById('teamCount').value)||5;
  document.getElementById('statTotal').textContent=tot.toLocaleString()+'개';
  document.getElementById('statPer').textContent=(team>0?Math.floor(tot/team):0).toLocaleString()+'개';
}

// ── 렌더: 좌측 ──
function renderLeft(){
  var sorted=leftData.slice().sort(function(a,b){return b.cnt!==a.cnt?b.cnt-a.cnt:a.order-b.order;});
  var html='';
  if(sdTotal>0){
    html+='<div class="b-row sd-row">'
      +'<div class="rank-wrap">'+diamondIcon()+'</div>'
      +'<span class="b-name no-edit">SD 형님</span>'
      +'<span class="b-cnt no-edit" style="margin-left:auto">'+sdTotal.toLocaleString()+'개</span>'
      +'</div>';
  }
  sorted.forEach(function(r,i){
    html+='<div class="b-row" onmouseenter="this.querySelector(\'.del-btn\').style.opacity=1" onmouseleave="this.querySelector(\'.del-btn\').style.opacity=0">'
      +'<div class="rank-wrap">'+rankIcon(i)+'</div>'
      +'<span class="b-name" onclick="editName(this,\'L\','+r.order+')">'+r.name+'</span>'
      +'<span class="b-cnt" onclick="editCnt(this,\'L\','+r.order+')" style="margin-left:auto">'+r.cnt.toLocaleString()+'개</span>'
      +'<button class="del-btn" onclick="delLeft('+r.order+')">✕</button>'
      +'</div>';
  });
  for(var i=sorted.length;i<3;i++){
    html+='<div class="b-row ph-row">'
      +'<div class="rank-wrap">'+rankIcon(i)+'</div>'
      +'<span class="b-name ph-name">—</span>'
      +'</div>';
  }
  document.getElementById('leftList').innerHTML=html;
}

// ── 렌더: 우측 ──
function renderRight(){
  var sorted=rightData.slice().sort(function(a,b){return b.cnt!==a.cnt?b.cnt-a.cnt:a.order-b.order;});
  var html='';
  sorted.forEach(function(r){
    html+='<div class="b-row" onmouseenter="this.querySelector(\'.del-btn\').style.opacity=1" onmouseleave="this.querySelector(\'.del-btn\').style.opacity=0">'
      +'<div class="rank-wrap">'+cheerIcon()+'</div>'
      +'<span class="b-name" onclick="editName(this,\'R\','+r.order+')">'+r.name+'</span>'
      +'<span class="b-cheer" onclick="editCheer(this,'+r.order+')" style="margin-left:auto">응원</span>'
      +'<button class="del-btn" onclick="delRight('+r.order+')">✕</button>'
      +'</div>';
  });
  if(!sorted.length){
    html+='<div class="b-row ph-row"><div class="rank-wrap">'+cheerIcon()+'</div><span class="b-name ph-name">—</span></div>';
  }
  document.getElementById('rightList').innerHTML=html;
}

// ── 입력 파싱: "닉네임 숫자(1이상)" ──
function parseInput(val){
  val=val.trim();
  var m=val.match(/^(.+?)\s+(\d+)$/);
  if(m&&m[1].trim()){var cnt=parseInt(m[2]);if(cnt>0)return{name:m[1].trim(),cnt:cnt};}
  return null;
}

// ── 추가 ──
function addLeft(){
  var raw=document.getElementById('leftIn').value;
  var p=parseInput(raw);
  if(!p){beep();return;}
  var ex=null;
  for(var i=0;i<leftData.length;i++){if(leftData[i].name===p.name){ex=leftData[i];break;}}
  if(ex) ex.cnt+=p.cnt;
  else leftData.push({name:p.name,cnt:p.cnt,order:orderL++});
  document.getElementById('leftIn').value='';
  renderLeft(); updateStats();
}
function addRight(){
  var raw=document.getElementById('rightIn').value;
  var p=parseInput(raw);
  if(!p){beep();return;}
  sdTotal+=p.cnt;
  var ex=null;
  for(var i=0;i<rightData.length;i++){if(rightData[i].name===p.name){ex=rightData[i];break;}}
  if(ex) ex.cnt+=p.cnt;
  else rightData.push({name:p.name,cnt:p.cnt,order:orderR++});
  document.getElementById('rightIn').value='';
  renderRight(); renderLeft(); updateStats();
}

// ── 삭제 ──
function delLeft(o){
  for(var i=0;i<leftData.length;i++){if(leftData[i].order===o){leftData.splice(i,1);break;}}
  renderLeft(); updateStats();
}
function delRight(o){
  for(var i=0;i<rightData.length;i++){
    if(rightData[i].order===o){sdTotal-=rightData[i].cnt;if(sdTotal<0)sdTotal=0;rightData.splice(i,1);break;}
  }
  renderRight(); renderLeft(); updateStats();
}

// ── 편집 ──
function editName(el,side,order){
  if(el.classList.contains('no-edit')||el.classList.contains('ph-name')) return;
  var cur=el.textContent;
  var inp=document.createElement('input');
  inp.className='edit-input'; inp.value=cur; inp.style.width='150px';
  el.replaceWith(inp); inp.focus(); inp.select();
  function save(){
    var v=inp.value.trim()||cur;
    var d=side==='L'?leftData:rightData;
    for(var i=0;i<d.length;i++){if(d[i].order===order){d[i].name=v;break;}}
    side==='L'?renderLeft():renderRight();
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cur;inp.blur();}});
}
function editCnt(el,side,order){
  var d=side==='L'?leftData:rightData, r=null;
  for(var i=0;i<d.length;i++){if(d[i].order===order){r=d[i];break;}}
  if(!r) return;
  var inp=document.createElement('input');
  inp.className='edit-input'; inp.type='number'; inp.value=r.cnt;
  el.replaceWith(inp); inp.focus(); inp.select();
  function save(){
    var v=parseInt(inp.value);
    if(!isNaN(v)&&v>=0){
      if(side==='R'){sdTotal+=v-r.cnt; if(sdTotal<0)sdTotal=0;}
      r.cnt=v;
    }
    if(side==='L') renderLeft(); else{renderRight();renderLeft();}
    updateStats();
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});
}
function editCheer(el,order){
  var r=null;
  for(var i=0;i<rightData.length;i++){if(rightData[i].order===order){r=rightData[i];break;}}
  if(!r) return;
  var inp=document.createElement('input');
  inp.className='edit-input'; inp.type='number'; inp.value=r.cnt;
  el.replaceWith(inp); inp.focus(); inp.select();
  function save(){
    var v=parseInt(inp.value);
    if(!isNaN(v)&&v>=0){sdTotal+=v-r.cnt; if(sdTotal<0)sdTotal=0; r.cnt=v;}
    renderRight(); renderLeft(); updateStats();
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});
}

// ── 초기화/링크 ──
function resetAll(){
  if(!confirm('모든 펀딩 정보를 초기화할까요?')) return;
  leftData=[]; rightData=[]; sdTotal=0; orderL=0; orderR=0;
  document.getElementById('memo').value='';
  document.getElementById('teamCount').value=5;
  renderLeft(); renderRight(); updateStats();
}
function openLink(u){ window.open(u,'_blank'); }

// ── 초기 실행 ──
document.addEventListener('DOMContentLoaded',function(){
  var a=document.getElementById('bgmAudio');
  a.addEventListener('timeupdate',function(){
    if(!a.duration) return;
    document.getElementById('bgmProg').style.width=(a.currentTime/a.duration*100)+'%';
  });
  a.addEventListener('ended',function(){
    document.getElementById('playBtn').textContent='▶';
    document.getElementById('bgmProg').style.width='0%';
  });
  document.getElementById('memo').addEventListener('keydown',function(e){
    if(e.key==='Enter'&&this.value.split('\n').length>=4) e.preventDefault();
  });
  renderLeft(); renderRight(); updateStats();
});
</script>
</body>
</html>
